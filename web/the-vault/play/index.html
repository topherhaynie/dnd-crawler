<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>The Vault — Mobile Input</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #101820;
            --panel: #1e2a36;
            --panel-2: #243443;
            --text: #f2f6fa;
            --muted: #c4d0dc;
            --accent: #f0a202;
            --ok: #49a078;
            --warn: #e76f51;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            min-height: 100svh;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at 20% -10%, #2c3e50 0%, transparent 45%),
                radial-gradient(1000px 500px at 100% 100%, #5a3d2b 0%, transparent 35%),
                var(--bg);
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 12px;
            padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
        }

        .card {
            background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
        }

        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            width: 90px;
            font-size: 13px;
            color: var(--muted);
            flex-shrink: 0;
        }

        input {
            flex: 1;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.28);
            color: var(--text);
            font-size: 16px;
            padding: 10px 12px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            border: 0;
            border-radius: 10px;
            background: var(--accent);
            color: #201600;
            font-weight: 700;
            font-size: 15px;
            padding: 11px 14px;
            width: 100%;
        }

        #status {
            font-size: 13px;
            color: var(--muted);
            min-height: 20px;
        }

        #status.ok {
            color: var(--ok);
        }

        #status.warn {
            color: var(--warn);
        }

        #joystickWrap {
            display: grid;
            place-items: center;
        }

        #joystick {
            width: min(78vw, 360px);
            height: min(78vw, 360px);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.24);
            background:
                radial-gradient(circle at 50% 50%, rgba(240, 162, 2, 0.14) 0, rgba(240, 162, 2, 0.02) 46%, transparent 60%),
                rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        #knob {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 34%;
            aspect-ratio: 1;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 35% 30%, #ffd27d 0%, #f0a202 65%, #c47d00 100%);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
        }

        .telemetry {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-variant-numeric: tabular-nums;
            color: var(--muted);
            font-size: 13px;
        }

        .action-row {
            display: flex;
            gap: 10px;
            padding: 0 4px;
        }

        .action-btn {
            flex: 1;
            border: 2px solid rgba(255, 255, 255, 0.16);
            border-radius: 12px;
            background: var(--panel-2);
            color: var(--text);
            font-weight: 700;
            font-size: 17px;
            padding: 16px 0;
            text-align: center;
            transition: background 0.15s, border-color 0.15s;
        }

        .action-btn:active {
            background: rgba(255, 255, 255, 0.12);
        }

        .action-btn.active {
            background: var(--accent);
            color: #201600;
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <section class="card">
        <div class="row">
            <label for="host">Host</label>
            <input id="host" autocomplete="off" value="127.0.0.1" />
        </div>
        <div class="row">
            <label for="port">Port</label>
            <input id="port" autocomplete="off" value="9090" inputmode="numeric" />
        </div>
        <div class="row">
            <label for="playerId">Player ID</label>
            <input id="playerId" autocomplete="off" placeholder="UUID from DM profile" />
        </div>
        <button id="connectBtn" type="button">Connect</button>
        <div id="status">Disconnected</div>
    </section>

    <section id="joystickWrap" class="card">
        <div id="joystick">
            <div id="knob"></div>
        </div>
    </section>

    <section class="action-row">
        <button id="dashBtn" class="action-btn" type="button">Dash</button>
        <button id="interactBtn" class="action-btn" type="button">Interact</button>
    </section>

    <section class="telemetry card">
        <div>x: <span id="xVal">0.00</span></div>
        <div>y: <span id="yVal">0.00</span></div>
    </section>

    <script>
        const hostEl = document.getElementById("host");
        const portEl = document.getElementById("port");
        const playerIdEl = document.getElementById("playerId");
        const connectBtn = document.getElementById("connectBtn");
        const statusEl = document.getElementById("status");

        const joystickEl = document.getElementById("joystick");
        const knobEl = document.getElementById("knob");
        const xValEl = document.getElementById("xVal");
        const yValEl = document.getElementById("yVal");
        const dashBtn = document.getElementById("dashBtn");
        const interactBtn = document.getElementById("interactBtn");

        let ws = null;
        let sending = false;
        let reconnectTimer = null;

        let activePointerId = null;
        let vectorX = 0;
        let vectorY = 0;
        let isDashing = false;

        function sendAction(action) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const pid = playerIdEl.value.trim();
                if (pid) {
                    ws.send(JSON.stringify({ type: "player_action", player_id: pid, action: action }));
                }
            }
        }

        function setStatus(text, cls = "") {
            statusEl.textContent = text;
            statusEl.className = cls;
        }

        function getWsUrl() {
            const host = hostEl.value.trim() || "127.0.0.1";
            const port = portEl.value.trim() || "9090";
            return `ws://${host}:${port}`;
        }

        function applyKnobFromVector() {
            const radius = joystickEl.clientWidth * 0.33;
            const px = vectorX * radius;
            const py = vectorY * radius;
            knobEl.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
            xValEl.textContent = vectorX.toFixed(2);
            yValEl.textContent = vectorY.toFixed(2);
        }

        function setVector(nx, ny) {
            const mag = Math.hypot(nx, ny);
            if (mag > 1) {
                vectorX = nx / mag;
                vectorY = ny / mag;
            } else {
                vectorX = nx;
                vectorY = ny;
            }
            applyKnobFromVector();
        }

        function resetVector() {
            setVector(0, 0);
        }

        function pointerToVector(clientX, clientY) {
            const rect = joystickEl.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = clientX - cx;
            const dy = clientY - cy;
            const radius = rect.width * 0.36;
            setVector(dx / radius, dy / radius);
        }

        joystickEl.addEventListener("pointerdown", (event) => {
            activePointerId = event.pointerId;
            joystickEl.setPointerCapture(event.pointerId);
            pointerToVector(event.clientX, event.clientY);
        });

        joystickEl.addEventListener("pointermove", (event) => {
            if (event.pointerId !== activePointerId) return;
            pointerToVector(event.clientX, event.clientY);
        });

        function handlePointerEnd(event) {
            if (event.pointerId !== activePointerId) return;
            activePointerId = null;
            resetVector();
        }

        joystickEl.addEventListener("pointerup", handlePointerEnd);
        joystickEl.addEventListener("pointercancel", handlePointerEnd);

        function sendLoop() {
            if (!sending) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                const player_id = playerIdEl.value.trim();
                if (player_id) {
                    ws.send(JSON.stringify({ player_id, x: vectorX, y: vectorY }));
                }
            }
            requestAnimationFrame(sendLoop);
        }

        function startSendLoop() {
            if (sending) return;
            sending = true;
            requestAnimationFrame(sendLoop);
        }

        function stopSendLoop() {
            sending = false;
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connect();
            }, 2000);
        }

        function connect() {
            const player_id = playerIdEl.value.trim();
            if (!player_id) {
                setStatus("Enter Player ID first", "warn");
                return;
            }

            const url = getWsUrl();
            if (ws) {
                try { ws.close(); } catch (_) { }
            }

            setStatus(`Connecting to ${url}...`);
            ws = new WebSocket(url);

            ws.addEventListener("open", () => {
                setStatus("Connected", "ok");
                try {
                    const pid = playerIdEl.value.trim();
                    if (pid) {
                        ws.send(JSON.stringify({ type: "bind", player_id: pid }));
                    }
                } catch (e) { }
                startSendLoop();
            });

            ws.addEventListener("close", () => {
                setStatus("Disconnected. Retrying...", "warn");
                stopSendLoop();
                scheduleReconnect();
            });

            ws.addEventListener("error", () => {
                setStatus("Connection error", "warn");
            });
        }

        connectBtn.addEventListener("click", connect);

        dashBtn.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            if (!isDashing) {
                isDashing = true;
                dashBtn.classList.add("active");
                sendAction("dash_start");
            }
        });

        const endDash = (e) => {
            e.preventDefault();
            if (isDashing) {
                isDashing = false;
                dashBtn.classList.remove("active");
                sendAction("dash_end");
            }
        };
        dashBtn.addEventListener("pointerup", endDash);
        dashBtn.addEventListener("pointercancel", endDash);
        dashBtn.addEventListener("pointerleave", endDash);

        interactBtn.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            sendAction("interact");
        });

        window.addEventListener("beforeunload", () => {
            stopSendLoop();
            if (ws) {
                try { ws.close(); } catch (_) { }
            }
        });

        // ── Auto-fill from query params or location hostname ──
        // Supports: ?host=IP&port=PORT&player_id=UUID
        // If served by the local game server, falls back to location.hostname.
        try {
            const params = new URLSearchParams(location.search);
            const qHost = params.get("host");
            const qPort = params.get("port");
            const qPlayer = params.get("player_id");

            if (qHost) {
                hostEl.value = qHost;
            } else if (location.protocol && location.protocol.startsWith("http") && location.hostname
                && location.hostname !== "localhost"
                && !location.hostname.startsWith("127.")
                && !location.hostname.includes("everstonekeep.com")) {
                // Served by the local game HTTP server — use its IP.
                hostEl.value = location.hostname;
            }

            if (qPort) {
                portEl.value = qPort;
            }
            if (qPlayer) {
                playerIdEl.value = qPlayer;
            }
        } catch (e) { }

        applyKnobFromVector();
    </script>
</body>

</html>
